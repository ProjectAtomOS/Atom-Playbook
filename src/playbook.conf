<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>AtomOS</Name>
    <Username>Project Atom</Username>
    <Title>Atom Playbook</Title>
    <ShortDescription>The BEST gift for your PC!</ShortDescription>
    <Description>Strip Windows to the best possible. Lowest CPU, RAM and disk usage.</Description>
    <Details>The ultimate Windows Playbook.</Details>
    <Version>0.0.5</Version>
    <UniqueId>537690f4-a419-4c12-a096-ba093d6f232b</UniqueId>
    <Git>https://github.com/ArabWep/Atom-Playbook</Git>
    <Website>https://www.atom-os.com/</Website>
    <UseKernelDriver>false</UseKernelDriver>
    <SupportedBuilds>
        <string>19044</string>
        <string>19045</string>
        <string>22000</string>
        <string>22621</string>
        <string>22631</string>
        <string>23620</string>
        <string>26100</string>
        <string>26200</string>
        <string>27000</string>
        <string>27100</string>
        <string>27200</string>
        <string>27300</string>
        <string>27400</string>
        <string>27500</string>
        <string>27600</string>
        <string>27700</string>
        <string>27800</string>
        <string>27900</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement>
        <Requirement>DefenderToggled</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <FeaturePages>
        <RadioPage DefaultOption="disable-defender" Description="Disabling Windows Defender improves performance but reduces security.">
            <Options>
                <RadioOption>
                    <Text>Disable Defender (Recommended)</Text>
                    <Name>disable-defender</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Keep Defender</Text>
                    <Name>enable-defender</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <CheckboxPage IsRequired="true" Description="Select optional components to remove or disable.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove Microsoft Edge</Text>
                    <Name>remove-edge</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Disable Automatic Updates</Text>
                    <Name>disable-updates</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
        <RadioPage DefaultOption="lzx-skip" Description="Reclaim ~4-6GB of disk space. Takes 30-60 min. Do not interrupt.">
            <TopLine Text="Apply LZX compression? ( VERY SLOW )"/>
            <Options>
                <RadioOption>
                    <Text>Yes, compress C: drive</Text>
                    <Name>lzx-apply</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No, skip compression</Text>
                    <Name>lzx-skip</Name>
                </RadioOption>
            </Options>
        </RadioPage>
    </FeaturePages>
</Playbook>
